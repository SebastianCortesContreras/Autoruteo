spring.application.name=routing-automation
server.port=${PORT:8080}
logging.level.ai.timefold=WARN
logging.level.com.example.routing=INFO

routing.solver-seconds=15
routing.max-route-distance-meters=40000
routing.max-leg-distance-meters=5000
routing.max-cluster-radius-meters=10000
routing.max-inter-stop-distance-meters=10000
routing.urban-cluster-radius-meters=6000
routing.out-of-city-cluster-radius-meters=18000
routing.out-of-city-threshold-meters=15000
routing.open-route-average-stop-distance-meters=2000

routing.carry-capacity-kg=750
routing.nhr-capacity-kg=3000
routing.npr-capacity-kg=5000
routing.hypothetical-capacity-kg=10000

routing.carry-heavy-order-threshold-kg=500
routing.npr-heavy-order-threshold-kg=3000
routing.nhr-max-orders=10
routing.npr-max-orders=5

routing.carry-fixed-cost=140
routing.carry-second-trip-fixed-cost=260
routing.nhr-fixed-cost=420
routing.npr-fixed-cost=650
routing.hypothetical-fixed-cost=100000000

routing.distance-weight=25
routing.cluster-overflow-weight=650
routing.utilization-weight=45
routing.small-order-in-large-vehicle-weight=2200
routing.hypothetical-order-weight=5000000
routing.npr-without-heavy-order-weight=40000
